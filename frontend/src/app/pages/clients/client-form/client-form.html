<div class="flex flex-col items-center gap-6 p-8 rounded-xl w-full max-w-lg mx-auto">

  <div class="flex items-center gap-6">
    <div class="w-24 h-24 rounded-full border-2 border-gray-500 bg-[#111827] flex items-center justify-center overflow-hidden">
      @if (previewUrl) {
        <img [src]="previewUrl" alt="Foto de perfil" class="w-full h-full object-cover" />
      } @else {
        <img src="user.png" alt="" class="w-13 h-13">
      }

    </div>
    <label class="px-5 py-2 rounded-lg bg-[#111827] border border-gray-500 text-white text-sm cursor-pointer hover:bg-gray-700 transition">
      Subir foto
      <input type="file" (change)="onFileChange($event)" accept="image/*" class="hidden" />
    </label>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 w-full">

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1 col-span-2">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Nombre completo</label>
        <input
          type="text"
          formControlName="fullName"
          placeholder="Juan Carlos Flores Rojas"
          class="w-full px-4 py-3 rounded-lg bg-[#111827] border border-gray-600 text-white text-sm placeholder-gray-500 outline-none focus:border-blue-500"
        />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">DNI</label>
        <input
          type="number"
          formControlName="dni"
          placeholder="12345678"
          class="w-full px-4 py-3 rounded-lg bg-[#111827] border border-gray-600 text-white text-sm placeholder-gray-500 outline-none focus:border-blue-500"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Celular</label>
        <input
          type="number"
          formControlName="telefono"
          placeholder="67676767"
          class="w-full px-4 py-3 rounded-lg bg-[#111827] border border-gray-600 text-white text-sm placeholder-gray-500 outline-none focus:border-blue-500"
        />
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs text-gray-400 uppercase tracking-widest">Correo</label>
      <input
        type="email"
        formControlName="email"
        placeholder="tucorreo@gmail.com"
        class="w-full px-4 py-3 rounded-lg bg-[#111827] border border-gray-600 text-white text-sm placeholder-gray-500 outline-none focus:border-blue-500"
      />
    </div>


    <div class="flex justify-center gap-4 mt-2">
      <button
        type="button"
        (click)="cancel.emit()"
        class="px-8 py-2.5 rounded-lg border border-gray-600 text-white text-sm hover:bg-gray-700 transition"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="px-8 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition"
      >
        {{ formType === 'edit' ? 'Guardar cambios' : 'Crear cliente' }}
      </button>
    </div>

  </form>
</div>
