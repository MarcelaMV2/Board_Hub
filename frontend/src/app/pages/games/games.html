<page-header
  title="Juegos"
  description="Gestiona el catalogo de juegos de mesa"
  buttonLabel="Nuevo juego"
  (buttonClick)="openModalGame()"
/>

<div class="flex flex-row justify-between items-center mb-4">
  <btn-secondary
  [tabs]="categories"
  [selected]="selectedCategory"
  (tabChange)="filterByCategory($event)" />

  <search-input placeholder="Buscar por nombre... " (searchChange)="onSearch($event)" />
</div>

<div class="grid grid-cols-3 gap-4">
  @for (game of filteredGames; track game.id) {
    <div class="bg-[#1E293B] rounded-xl overflow-hidden border border-[#334155]">
      <!-- imagen placeholder -->
      <div class="relative h-44 bg-[#0F172A] flex items-center justify-center">
        <img src="logo.jpg  " alt="" class="text-[#334155] text-4xl" />
        <div class="justify-between">
          <span
            class="absolute top-2 left-2 text-xs bg-[#1E293B] text-[#94A3B8] px-2 py-1 rounded-full"
          >
            {{ game.category.name }}
          </span>
          <img src="more_vert.png" alt="" class="absolute top-2 px-2 py-1 rounded-full" />

        </div>
      </div>

      <div class="p-4">
        <div class="flex flex-row gap-7 justify-between">
          <h3 class="text-[#F8FAFC] font-semibold">{{ game.title }}</h3>
          <span
            class="top-2 right-2 bg-yellow-500 text-black text-xs font-bold px-2 py-1 rounded-full"
          >
            Bs. {{ game.priceDay }}/día
          </span>
        </div>

        <div class="flex gap-4 mt-2 text-[#94A3B8] text-xs">
          <div class="flex flex-row gap-2">
            <img src="user.png" alt="" class="w-5 h-5" /><span
              >{{ game.minPlayers }}-{{ game.maxPlayers }} jugadores</span
            >
          </div>
          <div class="flex flex-row gap-2">
            <img src="clock.png" alt="" class="w-5 h-5" /><span> {{ game.durationGame }}m</span>
          </div>
        </div>

        <div class="mt-3">
          @if (game.status === 'DISPONIBLE') {
            <app-status-chip [label]="game.stockAvailable + ' disponibles'" type="disponible" />
          } @else {
            <app-status-chip label="Agotado" type="agotado" />
          }
        </div>
      </div>
    </div>
  }
</div>
