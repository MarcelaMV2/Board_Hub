<div class="flex flex-col items-center gap-6 p-8 rounded-xl w-full max-w-lg mx-auto">
  <div class="flex flex-col gap-2 w-full">
    <label class="text-xs text-gray-400 uppercase tracking-widest">Subir imagen</label>
    <label
      class="flex flex-col items-center justify-center w-full h-28 rounded-lg border border-dashed border-gray-600 bg-[#111827] cursor-pointer hover:border-blue-500 transition"
    >
      @if (previewUrl) {
        <img [src]="previewUrl" alt="preview" class="h-full w-full object-cover rounded-lg" />
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-8 h-8 text-gray-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0L8 8m4-4l4 4"
          />
        </svg>
      }
      <input type="file" (change)="onFileChange($event)" accept="image/*" class="hidden" />
    </label>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-2 w-full">
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Nombre</label>
        <mat-form-field appearance="outline" class="w-full">
          <input matInput formControlName="title" placeholder="Monopolio" />
        </mat-form-field>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Categoria</label>
        <select
          formControlName="idCategory"
          class="w-full h-14 px-3 rounded-lg bg-[#111827] border border-gray-600 text-white text-sm outline-none focus:border-blue-500"
        >
          <option value="" disabled>Seleccionar categoria</option>
          @for (cat of categories; track cat.id) {
            <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-xs text-gray-400 uppercase tracking-widest">Descripcion</label>
      <mat-form-field appearance="outline" class="w-full">
        <textarea
          matInput
          formControlName="description"
          placeholder="Añadir descripción...."
          rows="3"
        ></textarea>
      </mat-form-field>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Jugadores minimo</label>
        <mat-form-field appearance="outline" class="w-full">
          <input matInput type="number" formControlName="minPlayers" placeholder="00" />
        </mat-form-field>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Jugadores maximo</label>
        <mat-form-field appearance="outline" class="w-full">
          <input matInput type="number" formControlName="maxPlayers" placeholder="00" />
        </mat-form-field>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Duracion (mnts)</label>
        <mat-form-field appearance="outline" class="w-full">
          <input matInput type="number" formControlName="durationGame" placeholder="00" />
        </mat-form-field>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Stock</label>
        <mat-form-field appearance="outline" class="w-full">
          <input matInput type="number" formControlName="stockTotal" placeholder="00" />
        </mat-form-field>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Precio diario</label>
        <mat-form-field appearance="outline" class="w-full">
          <input matInput type="number" formControlName="priceDay" placeholder="00.00" />
        </mat-form-field>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-400 uppercase tracking-widest">Estado</label>
        <div class="flex items-center h-14">
          <span
            class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-green-500/10 border border-green-500/40 text-green-400 text-sm font-semibold"
          >
            <span class="w-2 h-2 rounded-full bg-green-400"></span>
            Activo
          </span>
        </div>
      </div>
    </div>

    <div class="flex justify-center gap-4 mt-2">
      <button
        type="button"
        (click)="cancel.emit()"
        class="px-8 py-2.5 rounded-lg border border-gray-600 text-white text-sm hover:bg-gray-700 transition"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="px-8 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition"
      >
        {{ formType === 'edit' ? 'Guardar cambios' : 'Crear Juego' }}
      </button>
    </div>
  </form>
</div>
