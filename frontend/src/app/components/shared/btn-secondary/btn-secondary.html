<div class="flex gap-2">
  @for (tab of tabs; track tab) {
    <button
      (click)="tabChange.emit(tab)"
      [class]="selected === tab
        ? 'px-4 py-2 rounded-lg text-sm font-medium bg-[#1E293B] text-white'
        : 'px-4 py-2 rounded-lg text-sm font-medium text-[#94A3B8] hover:bg-[#1E293B] border border-[#475569] transition'">
      {{ tab }}
    </button>
  }
</div>
