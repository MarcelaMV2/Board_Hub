<div class="flex items-center gap-2 bg-[#1E293B] border border-[#334155] rounded-lg px-3 w-70 h-11">
  <svg
    xmlns="http://www.w3.org/2000/svg"
    class="w-4 h-4 text-[#94A3B8]"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
    />
  </svg>
  <input
    type="text"
    [placeholder]="placeholder"
    (input)="searchChange.emit($any($event.target).value)"
    class="bg-transparent text-[#94A3B8] text-sm outline-none w-full placeholder-[#94A3B8]"
  />
</div>
