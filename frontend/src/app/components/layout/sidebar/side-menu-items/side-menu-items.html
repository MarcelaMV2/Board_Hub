<div class="items-center w-57 h-2.5">
  <div class="w-57 h-fit gap-2.5">
    <a href="#" class="text-blue-500 text-sm font-semibold px-2">Menu Principal</a>
  </div>
  <div class="flex flex-col w-57">
    @for (item of menuOptions; track $index) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-blue-800"
        class="w-full px-2 inline-flex gap-3 items-center rounded-lg py-3 hover:bg-blue-500 hover:items-white transition ease-linear duration-150"
      >
        <div class="w-6 h-6 hover:to-white">
          <img src="{{ item.icon }}" alt="" />
        </div>
        <div class="w-43 h-6 text-[#94A3B8] hover:text-white">
          <p>{{ item.label }}</p>
        </div>
      </a>
    }
  </div>
</div>
