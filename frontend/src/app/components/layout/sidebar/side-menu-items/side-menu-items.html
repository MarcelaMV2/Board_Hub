<div class="items-center w-57 h-2.5">
  <div class="w-57 h-fit gap-2.5">
    <a href="#" class="text-blue-500 text-sm font-semibold px-2">Menu Principal</a>
  </div>
  <div class="flex flex-col w-57">
    @for (item of menuOptions; track $index) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-blue-500"
        #rla="routerLinkActive"
        (click)="itemClicked.emit()"
        class="w-full px-2 inline-flex gap-3 items-center rounded-lg py-3 hover:bg-[#2f3b4e] transition ease-linear duration-150"
      >
        <lucide-icon
          [img]="item.icon"
          [size]="20"
          [class.text-white]="rla.isActive"
          [class.text-[#94A3B8]]="!rla.isActive"
          class="transition"
        >
        </lucide-icon>
        <span
          [class.text-white]="rla.isActive"
          [class.text-[#94A3B8]]="!rla.isActive"
          class="text-sm transition"
        >
          {{ item.label }}
        </span>
      </a>
    }
  </div>
</div>
